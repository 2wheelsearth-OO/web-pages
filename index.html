<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocipede Matchmaker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header-wrap">
            <h1>VELOCIPEDE</h1>
            <p>Matchmaker</p>
        </div>

        <div class="ui">
            <div class="group">
                <label class="sec-label">Bike Type</label>
                <div class="row">
                    <button class="btn active" onclick="filterType('all')">ALL</button>
                    <button class="btn" onclick="filterType('road')">Road</button>
                    <button class="btn" onclick="filterType('mtb')">MTB</button>
                </div>
            </div>

            <div class="group">
                <div class="sld-header">
                    <span class="sld-title">Max Price</span>
                    <span id="price-display">$2000</span>
                </div>
                <input type="range" id="price-slider" min="200" max="5000" step="100" value="2000" oninput="updatePrice(this.value)">
            </div>
        </div>

        <div class="gallery-container">
            <div id="bike-list" class="gallery"></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
