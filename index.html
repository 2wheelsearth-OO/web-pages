<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocipede | Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="corner tl">SYS_v2.0</div>
    <div class="corner tr">2026_EDITION</div>

    <div class="header-wrap">
        <h1>Velocipede</h1>
        <div class="sub">Matchmaker</div>
    </div>

    <div class="ui">
        <div class="group">
            <span class="type-label">Bike Type</span>
            <div class="row">
                <button class="btn active" onclick="filterType('all')">All</button>
                <button class="btn" onclick="filterType('road')">Road</button>
                <button class="btn" onclick="filterType('mountain')">MTB</button>
            </div>
        </div>

        <div class="group">
            <div class="sld-header">
                <span class="sld-title">Max Price</span>
                <span id="price-display" class="sld-value">$2000</span>
            </div>
            <input type="range" id="price-slider" min="500" max="5000" step="100" value="2000" oninput="updatePrice(this.value)">
        </div>
    </div>

    <div class="gallery-container">
        <div id="bike-list" class="gallery"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
