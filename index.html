<!-- VERSION 66.14.5 - Stable UI / No Shift / No Scroll -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocipede | Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0e0e11;
            --txt: #e3e3e3;
            --dim: #9aa0a6;
            --brd: #3c4043;
            --box: #1e1e21;
            --accent: #4c4c4f;
            --highlight: #72f272;
        }

        html, body { 
            height: 100%; margin: 0; 
            background: var(--bg); color: var(--txt);
            font-family: "Google Sans", -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .corner { position: fixed; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; z-index: 100; opacity: 0.4; }
        .tl { top: 10px; left: 15px; } .tr { top: 10px; right: 15px; }
        .bl { bottom: 10px; left: 15px; } .br { bottom: 10px; right: 15px; }
        
        .header-wrap { width: 100%; max-width: 500px; text-align: center; margin-bottom: 5px; }
        h1 { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 1.6rem; 
            margin: 0; 
            transform: scaleY(1.2) rotate(-0.5deg);
            text-transform: uppercase;
        }
        .sub { font-size: 11px; color: var(--dim); margin-top: 2px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }

        .ui { width: 100%; max-width: 480px; z-index: 10; }
        .group { margin-bottom: 6px; } 
        
        .label { font-size: 11px; color: var(--dim); text-transform: uppercase; text-align: center; display: block; margin-bottom: 3px; font-weight: 600; opacity: 0.6; }

        .row { display: flex; gap: 6px; padding: 0 5px; }
        .btn { 
            flex: 1; padding: 8px 2px; border: 1px solid var(--brd); background: transparent; 
            color: var(--dim); border-radius: 8px; cursor: pointer; 
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .btn.active { background: var(--box); color: #fff; border-color: var(--highlight); }

        .sld-wrap { padding: 2px 0; position: relative; height: 24px; display: flex; align-items: center; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: #3c4043; }
        input[type=range]::-webkit-slider-thumb {
            height: 22px; width: 22px; -webkit-appearance: none; margin-top: -11px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>') no-repeat center;
            background-size: contain; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8));
        }

        /* Fixed Heights to prevent UI Jumping */
        .vals { display: flex; justify-content: space-between; align-items: baseline; height: 18px; font-size: 13px; color: var(--dim); }
        .bold { color: var(--txt); font-weight: 700; font-size: 15px; }
        
        .range-msg-wrap { height: 16px; margin-top: 1px; }
        .range-msg { 
            font-size: 12px; 
            text-align: right; 
            color: var(--highlight); 
            font-weight: 700; 
            text-transform: uppercase; 
            padding-right: 5px;
            visibility: hidden; /* Prevent layout shift, toggle with class */
        }
        .range-msg.show { visibility: visible; }

        .gallery-container {
            width: 100%;
            height: 280px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
        }

        .gallery { 
            display: flex; 
            gap: 12px; 
            width: 100%; 
            justify-content: center; 
            overflow-x: auto; 
            padding: 5px;
            z-index: 5;
            min-height: 200px;
        }

        .watermark { 
            position: absolute; 
            width: 200px; 
            opacity: 0.04; 
            filter: invert(1); 
            pointer-events: none; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
        }
        
        .card { width: 180px; flex-shrink: 0; text-align: center; display: none; }
        .img-box { 
            background: rgba(255,255,255,0.02); 
            border-radius: 10px;
            aspect-ratio: 4/3; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .price { font-size: 18px; font-weight: 800; margin-top: 5px; color: var(--txt); }
        .filename-debug {
            font-size: 12px; color: #ffb74d; margin-top: 3px;
            font-family: monospace; opacity: 0.8;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding: 0 5px;
        }
        .debug-id { font-size: 12px; color: var(--dim); font-family: monospace; font-weight: bold; }
        
        #loading { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.2em; }
    </style>
</head>
<body onload="init()">

    <div class="corner tl" id="d">DATE</div>
    <div class="corner tr" id="t">TIME</div>
    <div class="corner bl">V66.14.5</div>
    <div class="corner br" id="s">RES</div>

    <div class="header-wrap">
        <h1>Stop Walking. Start Rolling.</h1>
        <p class="sub">Inventory Management Mode</p>
    </div>

    <div class="ui">
        <div class="group">
            <span class="label">Choose Your Ride</span>
            <div class="row">
                <button class="btn" id="b-M" onclick="setS('M')">Male / High Bar</button>
                <button class="btn active" id="b-any" onclick="setS('any')">All Types</button>
                <button class="btn" id="b-F" onclick="setS('F')">Female / Step Thru</button>
            </div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="hS" min="40" max="82" value="68" oninput="upd()"></div>
            <div class="vals"><span>Rider Height</span><span id="hL" class="bold">5'8" (173cm)</span></div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="bS" min="0" max="100" value="30" oninput="upd()"></div>
            <div class="vals"><span>Target Budget</span><span id="bL" class="bold">$200</span></div>
            <div class="range-msg-wrap"><div id="rangeDisplay" class="range-msg">Scanning...</div></div>
        </div>
    </div>

    <div class="gallery-container">
        <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/collagraphy%20bike%20logo.png" class="watermark">
        <div id="loading">Connecting...</div>
        <div class="gallery" id="g"></div>
    </div>

    <script>
        const GITHUB_REPO_URL = "https://api.github.com/repos/2wheelsearth-OO/Assets/contents/";
        const RAW_BASE_URL = "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/";

        let bikes = [];
        let curS = 'any';

        function extractDataFromFilename(filename) {
            const regex = /(\d+)([MFU])(\d{4})/i;
            const match = filename.match(regex);
            if (!match) return null;
            const wheelSize = parseInt(match[3].substring(0, 2));
            return {
                id: filename,
                filename: filename,
                price: parseInt(match[1]),
                mfu: match[2].toUpperCase(),
                wheelSize: wheelSize === 70 ? "700C" : wheelSize,
                frameSize: parseInt(match[3].substring(2)),
                isChildrenWheel: (wheelSize <= 20),
                url: RAW_BASE_URL + encodeURIComponent(filename)
            };
        }

        async function init() {
            try {
                const response = await fetch(GITHUB_REPO_URL);
                const files = await response.json();
                bikes = files
                    .filter(file => /\.(png|jpg|jpeg|webp)$/i.test(file.name))
                    .map(file => extractDataFromFilename(file.name))
                    .filter(b => b !== null)
                    .sort((a, b) => a.price - b.price);

                document.getElementById('loading').style.display = 'none';
                const g = document.getElementById('g');
                bikes.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.id = `card-${b.id}`;
                    div.innerHTML = `
                        <div class="img-box"><img loading="lazy" src="${b.url}"></div>
                        <div class="price">$${b.price}</div>
                        <div class="filename-debug">${b.filename}</div>
                        <div class="debug-id">${b.wheelSize} whl / ${b.frameSize}" frm</div>
                    `;
                    g.appendChild(div);
                });
                upd();
            } catch (err) { console.error(err); }
            setInterval(tick, 1000);
            tick();
        }

        function setS(val) {
            curS = val;
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.id === `b-${val}`));
            upd();
        }

        function upd() {
            if (!bikes.length) return;
            const h = parseFloat(document.getElementById('hS').value);
            const bRaw = document.getElementById('bS').value;
            const targetBudget = Math.round(50 + (1000 - 50) * Math.pow(bRaw / 100, 2));
            
            const feet = Math.floor(h / 12);
            const inches = Math.round(h % 12);
            const cm = Math.round(h * 2.54);
            document.getElementById('hL').innerText = `${feet}'${inches}" (${cm}cm)`;
            document.getElementById('bL').innerText = `$${targetBudget}`;

            const riderIsAdultHeight = (h >= 60);
            let bestSpread = 50;
            let currentMatches = [];

            // Find best fit matching logic
            for (let spread = 50; spread >= 0; spread -= 5) {
                bestSpread = spread;
                currentMatches = bikes.filter(bike => {
                    const pMatch = (bike.price >= (targetBudget - spread) && bike.price <= (targetBudget + spread));
                    const tMatch = (curS === 'any' || bike.mfu === 'U' || bike.mfu === curS);
                    const cMatch = (riderIsAdultHeight !== bike.isChildrenWheel);
                    let fMatch = !bike.isChildrenWheel ? (h >= (bike.frameSize + 44) && h <= (bike.frameSize + 58)) : (h >= (bike.frameSize + 30) && h <= (bike.frameSize + 55));
                    return pMatch && tMatch && cMatch && fMatch;
                });
                if (currentMatches.length <= 3) break;
            }

            const rangeEl = document.getElementById('rangeDisplay');
            if (currentMatches.length) {
                rangeEl.innerText = `BEST MATCHES ($${targetBudget - bestSpread} — $${targetBudget + bestSpread})`;
                rangeEl.classList.add('show');
            } else {
                rangeEl.classList.remove('show');
            }

            const matchIds = currentMatches.map(m => m.id);
            bikes.forEach(b => {
                const el = document.getElementById(`card-${b.id}`);
                if (el) el.style.display = matchIds.includes(b.id) ? 'block' : 'none';
            });
        }

        function tick() {
            const n = new Date();
            document.getElementById('d').innerText = n.toLocaleDateString().toUpperCase();
            document.getElementById('t').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('s').innerText = `${window.innerWidth}X${window.innerHeight}`;
        }
    </script>
</body>
</html>
