<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker - Gas / Battery black hole free</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #131314; 
            color: #e3e3e3; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }
        
        .version-badge {
            font-size: 11px;
            color: #8ab4f8; 
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .filter-container { 
            background: #1e1f20; 
            padding: 40px; 
            border-radius: 28px; 
            max-width: 600px; 
            margin-bottom: 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border: 1px solid #444746;
            width: 100%; 
        }

        h1 { text-align: center; color: #fff; font-weight: 400; margin-bottom: 5px; }
        .sub-header { text-align: center; color: #a8c7fa; margin-bottom: 40px; font-size: 1.1em; }
        
        .input-group { margin-bottom: 30px; }
        label { display: flex; align-items: center; font-weight: 500; margin-bottom: 15px; color: #c4c7c5; }

        .gender-toggle { display: flex; gap: 12px; }
        .gender-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid #444746;
            background: #2b2d2f;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .gender-btn.active {
            background: #a8c7fa;
            color: #062e6f;
            border-color: #a8c7fa;
        }

        /* High-Visibility Rider Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #444746;
            border-radius: 2px;
        }

        /* Bicycle Icon Handle - Filtered for High Visibility */
        input[type=range]::-webkit-slider-thumb {
            height: 45px;
            width: 45px;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -20px; 
            content: url('https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/image_75af43.png');
            /* Bright White Filter */
            filter: brightness(0) invert(1); 
        }

        input[type=range]::-moz-range-thumb {
            height: 45px;
            width: 45px;
            background: transparent;
            border: none;
            cursor: pointer;
            content: url('https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/image_75af43.png');
            filter: brightness(0) invert(1);
        }

        .slider-val { margin-left: auto; color: #a8c7fa; font-weight: bold; }

        button#searchBtn { 
            background: #a8c7fa; 
            color: #062e6f; 
            border: none; 
            padding: 20px; 
            border-radius: 100px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            margin-top: 10px;
        }
        button#searchBtn:hover { background: #c2e7ff; transform: scale(1.01); }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1400px; padding: 0 20px;}
        .card { 
            background: #1e1f20; 
            width: 280px; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #444746;
            transition: transform 0.2s; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: translateY(-5px); }
        .card.hidden { display: none; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        
        .card-text { color: #c4c7c5; font-size: 0.9em; letter-spacing: 0.5px; margin: 12px 0 0 0; text-align: center;}
    </style>
</head>
<body>

    <div class="version-badge">PROGRAM VERSION: 24.0 | DATE: 2026-04-12 | TIME: 1:55 PM</div>

    <h1>Stop Walking, Start Rolling</h1>
    <p class="sub-header">Gas / Battery black hole free</p>

    <div class="filter-container">
        <div class="input-group">
            <label>Style Preference</label>
            <div class="gender-toggle">
                <button class="gender-btn active" onclick="setGender('any', this)">Unisex / All</button>
                <button class="gender-btn" onclick="setGender('male', this)">Male Styles</button>
                <button class="gender-btn" onclick="setGender('female', this)">Female Styles</button>
            </div>
        </div>

        <div class="input-group">
            <label>
                Your Height: 
                <span id="heightLabel" class="slider-val">5'5" (165 cm)</span>
            </label>
            <input type="range" id="userHeight" min="36" max="80" value="65" oninput="updateHeight(this.value)">
        </div>

        <div class="input-group">
            <label>
                Max Budget: 
                <span id="budgetLabel" class="slider-val">$400</span>
            </label>
            <input type="range" id="userBudget" min="30" max="1000" value="400" oninput="updateBudget(this.value)">
        </div>

        <button id="searchBtn" onclick="filterBikes()">Find my healthy machine match...</button>
    </div>

    <div class="gallery" id="bikeGallery">
        <div class="card" data-sex="female" data-min-h="48" data-max-h="68" data-price="120">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png">
            <p class="card-text">24" Wheels | 13" Frame | $120</p>
        </div>

        <div class="card" data-sex="male" data-min-h="62" data-max-h="72" data-price="180">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg">
            <p class="card-text">26" Wheels | 18" Frame | $180</p>
        </div>

        <div class="card" data-sex="any" data-min-h="40" data-max-h="55" data-price="80">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg">
            <p class="card-text">20" Wheels | CS Frame | $80</p>
        </div>

        <div class="card" data-sex="female" data-min-h="58" data-max-h="68" data-price="60">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png">
            <p class="card-text">24" Wheels | CS Frame | $60</p>
        </div>
    </div>

    <script>
        let selectedSex = 'any';

        function setGender(val, btn) {
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = val % 12;
            let cm = Math.round(val * 2.54);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}" (${cm} cm)`;
        }

        function updateBudget(val) {
            document.getElementById('budgetLabel').innerText = `$${val}`;
        }

        function filterBikes() {
            const height = parseInt(document.getElementById('userHeight').value);
            const budget = parseInt(document.getElementById('userBudget').value);
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const bSex = card.getAttribute('data-sex');
                const bMinH = parseInt(card.getAttribute('data-min-h'));
                const bMaxH = parseInt(card.getAttribute('data-max-h'));
                const bPrice = parseInt(card.getAttribute('data-price'));

                const sexMatch = (selectedSex === 'any' || selectedSex === bSex);
                const heightMatch = (height >= bMinH && height <= bMaxH);
                const budgetMatch = (bPrice <= budget);

                if (sexMatch && heightMatch && budgetMatch) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
