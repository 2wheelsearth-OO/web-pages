<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker - Dark Edition</title>
    <style>
        /* Gemini-style Dark Theme */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #131314; 
            color: #e3e3e3; 
            padding: 20px; 
            margin: 0;
        }
        .filter-container { 
            background: #1e1f20; 
            padding: 30px; 
            border-radius: 24px; 
            max-width: 600px; 
            margin: 0 auto 40px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #444746;
        }
        h1 { text-align: center; color: #fff; font-weight: 400; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; font-weight: 500; margin-bottom: 12px; color: #c4c7c5; }

        /* Gender Buttons */
        .gender-toggle { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #444746;
            background: #2b2d2f;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .gender-btn.active {
            background: #a8c7fa;
            color: #062e6f;
            border-color: #a8c7fa;
        }

        /* Sliders */
        input[type=range] {
            width: 100%;
            height: 6px;
            background: #444746;
            border-radius: 5px;
            outline: none;
            accent-color: #a8c7fa;
        }
        .slider-val { float: right; color: #a8c7fa; font-weight: bold; }

        button#searchBtn { 
            background: #a8c7fa; 
            color: #062e6f; 
            border: none; 
            padding: 16px; 
            border-radius: 100px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 10px;
        }
        button#searchBtn:hover { background: #c2e7ff; }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { 
            background: #1e1f20; 
            width: 280px; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #444746;
            transition: transform 0.2s; 
        }
        .card:hover { transform: translateY(-5px); }
        .card.hidden { display: none; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        h2 { font-size: 1.1em; margin: 15px 0 5px; }
        p { color: #c4c7c5; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Find Your Ride</h1>

    <div class="filter-container">
        <div class="input-group">
            <label>1. Style Preference</label>
            <div class="gender-toggle">
                <button class="gender-btn active" onclick="setGender('any', this)">Don't Care</button>
                <button class="gender-btn" onclick="setGender('male', this)">Men's</button>
                <button class="gender-btn" onclick="setGender('female', this)">Women's</button>
            </div>
        </div>

        <div class="input-group">
            <label>2. Your Height: <span id="heightLabel" class="slider-val">5'5" (65")</span></label>
            <input type="range" id="userHeight" min="36" max="78" value="65" oninput="updateHeight(this.value)">
        </div>

        <div class="input-group">
            <label>3. Max Budget: <span id="budgetLabel" class="slider-val">$400</span></label>
            <input type="range" id="userBudget" min="30" max="1000" value="400" oninput="updateBudget(this.value)">
        </div>

        <button id="searchBtn" onclick="filterBikes()">Show Matching Bikes</button>
    </div>

    <div class="gallery" id="bikeGallery">
        <div class="card" data-sex="male" data-min-h="62" data-max-h="72" data-price="180">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg">
            <h2>Green Haro</h2>
            <p>Men's | 5'2" - 6'0" | $180</p>
        </div>

        <div class="card" data-sex="any" data-min-h="40" data-max-h="55" data-price="80">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg">
            <h2>Elementary Suspension</h2>
            <p>Kids | 3'4" - 4'7" | $80</p>
        </div>

        <div class="card" data-sex="female" data-min-h="58" data-max-h="68" data-price="60">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png">
            <h2>Girl Torker</h2>
            <p>Women's | 4'10" - 5'8" | $60</p>
        </div>
    </div>

    <script>
        let selectedSex = 'any';

        function setGender(val, btn) {
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = val % 12;
            document.getElementById('heightLabel').innerText = `${feet}'${inches}" (${val}")`;
        }

        function updateBudget(val) {
            document.getElementById('budgetLabel').innerText = `$${val}`;
        }

        function filterBikes() {
            const height = parseInt(document.getElementById('userHeight').value);
            const budget = parseInt(document.getElementById('userBudget').value);
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const bSex = card.getAttribute('data-sex');
                const bMinH = parseInt(card.getAttribute('data-min-h'));
                const bMaxH = parseInt(card.getAttribute('data-max-h'));
                const bPrice = parseInt(card.getAttribute('data-price'));

                const sexMatch = (selectedSex === 'any' || selectedSex === bSex);
                const heightMatch = (height >= bMinH && height <= bMaxH);
                const budgetMatch = (bPrice <= budget);

                if (sexMatch && heightMatch && budgetMatch) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
