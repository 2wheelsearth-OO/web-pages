<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker | Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #161617;
            --accent-blue: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --border: #424245;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 40px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .version-badge {
            font-size: 10px;
            color: var(--text-dim); 
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 { 
            font-size: 48px; 
            font-weight: 600; 
            letter-spacing: -0.015em;
            margin-bottom: 10px;
            text-align: center;
        }

        .sub-header { 
            font-size: 21px; 
            color: var(--text-dim); 
            margin-bottom: 50px; 
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
        }

        .filter-container { 
            background: var(--card-bg); 
            padding: 48px; 
            border-radius: 30px; 
            max-width: 640px; 
            margin-bottom: 60px; 
            width: 100%; 
            box-sizing: border-box;
        }

        .input-group { margin-bottom: 50px; }
        .style-label { font-size: 14px; font-weight: 600; margin-bottom: 20px; display: block; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .gender-toggle { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
        }
        .gender-btn:hover { border-color: var(--text-dim); }
        .gender-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .slider-wrapper { position: relative; padding: 20px 0; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 28px;
            width: 28px;
            -webkit-appearance: none;
            margin-top: -12px; 
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.1); }

        .slider-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .row-title { color: var(--text-dim); font-size: 17px; }
        .row-val { color: var(--text-main); font-weight: 600; font-size: 17px; }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
            width: 100%; 
            max-width: 1200px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.4s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 240px; object-fit: cover; border-radius: 14px; margin-bottom: 20px; }
        .card-title { font-size: 21px; font-weight: 600; margin-bottom: 8px; }
        .card-text { color: var(--text-dim); font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body onload="initApp()">

    <div class="version-badge">Version 40.0 | Clean Focus</div>

    <h1>Stop Walking. Start Rolling.</h1>
    <p class="sub-header">The Gas / Battery black hole free Machine.</p>

    <div class="filter-container">
        <div class="input-group">
            <span class="style-label">Style</span>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btn-any" onclick="setGender('any')">All Models</button>
                <button class="gender-btn" id="btn-male" onclick="setGender('male')">Male</button>
                <button class="gender-btn" id="btn-female" onclick="setGender('female')">Female</button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="36" step="0.1" oninput="stopAnimation(); updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height</span>
                <span id="heightLabel" class="row-val">3'0"</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="0" max="100" value="0" step="0.1" oninput="stopAnimation(); handleBudgetInput(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Maximum Budget</span>
                <span id="budgetLabel" class="row-val">$30</span>
            </div>
        </div>
    </div>

    <div class="gallery" id="bikeGallery"></div>

    <script>
        const bikeDatabase = [
            { name: "Blue Checker", style: "female", minHeight: 48, maxHeight: 68, price: 120, specs: "24\" Wheels • 13\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { name: "Green Haro", style: "male", minHeight: 62, maxHeight: 72, price: 180, specs: "26\" Wheels • 18\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { name: "Elementary Special", style: "any", minHeight: 40, maxHeight: 55, price: 80, specs: "20\" Wheels • Kids Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg" },
            { name: "Torker Cruiser", style: "female", minHeight: 58, maxHeight: 68, price: 60, specs: "24\" Wheels • Steel Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let animationActive = true;
        let selectedSex = 'any';

        function initApp() {
            renderGallery();
            runEntryAnimation(); // Only runs once
        }

        function runEntryAnimation() {
            const startTime = performance.now();
            const duration = 2500; // Smooth 2.5 second entry

            function step(time) {
                if (!animationActive) return;
                let progress = (time - startTime) / duration;
                if (progress > 1) {
                    animationActive = false;
                    return;
                }

                // Smooth "Ease Out" cubic function
                let ease = 1 - Math.pow(1 - progress, 3);
                
                let hVal = 36 + (68 - 36) * ease;
                let bVal = 0 + (50 - 0) * ease;

                document.getElementById('userHeight').value = hVal;
                updateHeight(hVal);
                
                document.getElementById('userBudget').value = bVal;
                handleBudgetInput(bVal);

                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function stopAnimation() { animationActive = false; }

        function renderGallery() {
            const gallery = document.getElementById('bikeGallery');
            gallery.innerHTML = bikeDatabase.map(bike => `
                <div class="card" data-style="${bike.style}" data-minh="${bike.minHeight}" data-maxh="${bike.maxHeight}" data-price="${bike.price}">
                    <img src="${bike.img}">
                    <div class="card-title">${bike.name}</div>
                    <div class="card-text">${bike.specs}<br>$${bike.price}</div>
                </div>
            `).join('');
            filterBikes();
        }

        function handleBudgetInput(val) {
            const price = Math.round(30 + (1000 - 30) * Math.pow(val / 100, 3));
            document.getElementById('budgetLabel').innerText = `$${price}`;
            filterBikes(price);
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = Math.round(val % 12);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}"`;
            filterBikes();
        }

        function setGender(val) {
            stopAnimation();
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            filterBikes();
        }

        function filterBikes(overrideBudget) {
            const h = parseFloat(document.getElementById('userHeight').value);
            const b = overrideBudget || Math.round(30 + (1000 - 30) * Math.pow(document.getElementById('userBudget').value / 100, 3));
            
            document.querySelectorAll('.card').forEach(card => {
                const match = (selectedSex === 'any' || selectedSex === card.dataset.style) &&
                              (h >= card.dataset.minh && h <= card.dataset.maxh) &&
                              (card.dataset.price <= b);
                card.style.display = match ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
