<!-- VERSION 66.9.4 - Compact ID Logic: Auto-detecting Price, Type, Wheel, and Frame -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocipede | Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0e0e11;
            --txt: #e3e3e3;
            --dim: #9aa0a6;
            --brd: #3c4043;
            --box: #1e1e21;
        }

        html, body { 
            height: 100vh; overflow: hidden; margin: 0; 
            background: var(--bg); color: var(--txt);
            font-family: "Google Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 10px 20px; box-sizing: border-box; }

        .corner { position: fixed; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; z-index: 100; }
        .tl { top: 15px; left: 20px; } .tr { top: 15px; right: 20px; }
        .bl { bottom: 15px; left: 20px; } .br { bottom: 15px; right: 20px; }
        
        .header-wrap { width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; padding: 0 10px; }
        
        h1 { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 1.8rem;
            line-height: 1;
            margin: 0; 
            opacity: 0.7; 
            white-space: nowrap; 
            display: inline-block;
            transform: scaleY(1.4) rotate(-0.5deg);
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .sub { font-size: 11px; color: var(--dim); margin-top: 10px; letter-spacing: 0.05em; opacity: 0.6; }

        .ui { width: 100%; max-width: 550px; margin-bottom: 10px; position: relative; z-index: 10; }
        .group { margin-bottom: 16px; }
        .label { font-size: 9px; color: var(--dim); text-transform: uppercase; text-align: center; display: block; margin-bottom: 8px; opacity: 0.5; }

        .row { display: flex; gap: 4px; padding: 0 5px; }
        .btn { 
            flex: 1; padding: 14px 4px; border: 1px solid var(--brd); background: transparent; 
            color: var(--dim); border-radius: 10px; cursor: pointer; font-size: 8px;
            transition: 0.2s; text-transform: uppercase; line-height: 1;
            display: flex; align-items: center; justify-content: center; text-align: center;
            white-space: nowrap; 
            letter-spacing: -0.01em;
        }

        .btn.active { background: var(--box); color: var(--txt); border-color: #4c4c4f; }

        .sld-wrap { padding: 15px 0 5px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: #2a2a2e; }
        input[type=range]::-webkit-slider-thumb {
            height: 24px; width: 24px; -webkit-appearance: none; margin-top: -23px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23c4c7c5" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>') no-repeat center;
            background-size: contain; filter: drop-shadow(0 2px 2px #000);
        }

        .vals { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-top: 4px; }
        .bold { color: var(--txt); font-weight: 500; }

        .gallery-container {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gallery { 
            display: flex; 
            gap: 15px; 
            width: 100%; 
            max-width: 900px; 
            justify-content: center; 
            flex-wrap: wrap; 
            overflow-y: auto; 
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .watermark { 
            position: absolute; 
            width: 280px; 
            opacity: 0.02; 
            filter: invert(1); 
            pointer-events: none; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 1; 
        }
        
        .card { width: 220px; text-align: center; display: none; z-index: 2; margin-bottom: 20px; }
        .img-box { 
            background: transparent; 
            aspect-ratio: 4/3; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: visible; 
        }
        .card img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .card:hover img { transform: translateY(-15px) scale(1.1); }
        .price { font-size: 18px; font-weight: 600; margin-top: 10px; color: var(--txt); letter-spacing: 0.05em; }
        .debug-id { font-size: 9px; color: var(--dim); margin-top: 4px; font-family: monospace; }
    </style>
</head>
<body onload="init()">

    <div class="corner tl" id="d">DATE</div>
    <div class="corner tr" id="t">TIME</div>
    <div class="corner bl">V66.9.4</div>
    <div class="corner br" id="s">RES</div>

    <div class="header-wrap">
        <h1>Stop Walking. Start Rolling.</h1>
        <p class="sub">Gas/Battery blackhole free transportation</p>
    </div>

    <div class="ui">
        <div class="group">
            <span class="label">Choose Your Ride</span>
            <div class="row">
                <button class="btn" id="b-M" onclick="setS('M')">Male / High Bar</button>
                <button class="btn active" id="b-any" onclick="setS('any')">All Types</button>
                <button class="btn" id="b-F" onclick="setS('F')">Female / Step Thru</button>
            </div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="hS" min="40" max="82" value="68" oninput="upd()"></div>
            <div class="vals"><span>Rider Height</span><span id="hL" class="bold">5'8"</span></div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="bS" min="0" max="100" value="30" oninput="upd()"></div>
            <div class="vals"><span>Budget Limit</span><span id="bL" class="bold">$200</span></div>
        </div>
    </div>

    <div class="gallery-container">
        <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/collagraphy%20bike%20logo.png" class="watermark">
        <div class="gallery" id="g"></div>
    </div>

    <script>
        // Database using your Compact Naming Convention: PriceMFUWheelSizeFrameSize
        const dbRaw = [
            { id: "120F2413", url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue%20checker%20board%20girl%20bike%20-%20120F2413.png" },
            { id: "180M2618", url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green%20Haro%20180M2021.jpg" },
            { id: "60F2419",  url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl%20Torker%20at%20front%20of%20house%2060F2019.png" },
            { id: "250U7021", url: "https://via.placeholder.com/220x165/1e1e21/9aa0a6?text=Road+700C" },
            { id: "90U2012",  url: "https://via.placeholder.com/220x165/1e1e21/9aa0a6?text=BMX+20" }
        ];

        let bikes = [];
        let curS = 'any';

        function parseBikeId(bike) {
            // Find the character index (M, F, or U)
            const match = bike.id.match(/([MFU])/i);
            if (!match) return null;

            const mfuIndex = match.index;
            const price = parseInt(bike.id.substring(0, mfuIndex));
            const mfu = bike.id[mfuIndex].toUpperCase();
            
            // Post-letter string (e.g., 2413 or 7021)
            const specs = bike.id.substring(mfuIndex + 1);
            const wheelSize = parseInt(specs.substring(0, 2));
            const frameSize = parseInt(specs.substring(2));

            let minH, maxH;
            
            // Applied measurement definitions:
            if (wheelSize >= 24) {
                // Seat tube measurement (Crank to top of seat tube)
                minH = frameSize + 44; 
                maxH = frameSize + 56;
            } else {
                // Horizontal measurement (Seat post center to wheel shaft center)
                // for wheel size 20 or smaller
                minH = frameSize + 32; 
                maxH = frameSize + 50;
            }

            return {
                id: bike.id,
                price,
                mfu,
                wheelSize: wheelSize === 70 ? "700C" : wheelSize,
                frameSize,
                minH,
                maxH,
                url: bike.url
            };
        }

        function init() {
            bikes = dbRaw.map(parseBikeId).filter(b => b !== null);
            const g = document.getElementById('g');
            
            bikes.forEach(b => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${b.id}`;
                div.innerHTML = `
                    <div class="img-box">
                        <img src="${b.url}" onerror="this.src='https://via.placeholder.com/220x165/1e1e21/9aa0a6?text=Bike+Photo'">
                    </div>
                    <div class="price">$${b.price}</div>
                    <div class="debug-id">${b.wheelSize} whl / ${b.frameSize}" frm</div>
                `;
                g.appendChild(div);
            });
            
            upd();
            setInterval(tick, 1000);
        }

        function setS(val) {
            curS = val;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`b-${val}`).classList.add('active');
            upd();
        }

        function upd() {
            const h = parseFloat(document.getElementById('hS').value);
            const bRaw = document.getElementById('bS').value;
            const budgetLimit = Math.round(50 + (1000 - 50) * Math.pow(bRaw / 100, 2));
            
            document.getElementById('hL').innerText = `${Math.floor(h/12)}'${Math.round(h%12)}"`;
            document.getElementById('bL').innerText = `$${budgetLimit}`;

            bikes.forEach(bike => {
                const el = document.getElementById(`card-${bike.id}`);
                const typeMatch = (curS === 'any' || bike.mfu === 'U' || bike.mfu === curS);
                const heightMatch = (h >= bike.minH && h <= bike.maxH);
                const budgetMatch = (bike.price <= budgetLimit);

                el.style.display = (typeMatch && heightMatch && budgetMatch) ? 'block' : 'none';
            });
        }

        function tick() {
            const n = new Date();
            document.getElementById('d').innerText = n.toLocaleDateString().toUpperCase();
            document.getElementById('t').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('s').innerText = `${window.innerWidth}X${window.innerHeight}`;
        }
    </script>
</body>
</html>
