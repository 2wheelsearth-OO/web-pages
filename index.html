<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker - Gas / Battery black hole free</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #131314; 
            color: #e3e3e3; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }
        
        .version-badge {
            font-size: 11px;
            color: #8ab4f8; 
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .filter-container { 
            background: #1e1f20; 
            padding: 40px; 
            border-radius: 28px; 
            max-width: 600px; 
            margin-bottom: 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border: 1px solid #444746;
            width: 100%; 
        }

        h1 { text-align: center; color: #fff; font-weight: 400; margin-bottom: 5px; }
        .sub-header { text-align: center; color: #a8c7fa; margin-bottom: 40px; font-size: 1.1em; }
        
        .input-group { margin-bottom: 45px; display: flex; flex-direction: column; }
        .style-label { font-weight: 500; margin-bottom: 15px; color: #c4c7c5; }

        .gender-toggle { display: flex; gap: 12px; }
        .gender-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid #444746;
            background: #2b2d2f;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .gender-btn.active {
            background: #a8c7fa;
            color: #062e6f;
            border-color: #a8c7fa;
        }

        .slider-wrapper {
            position: relative;
            padding-top: 30px; 
            margin-bottom: 5px;
        }

        /* Budget Ticks/Indicators */
        .budget-indicators {
            position: relative;
            width: 100%;
            height: 20px;
            margin-top: -2px;
        }

        .tick {
            position: absolute;
            top: 0;
            font-size: 10px;
            color: #707372;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tick::before {
            content: '';
            width: 1px;
            height: 6px;
            background: #444746;
            margin-bottom: 4px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333537;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 42px;
            width: 42px;
            -webkit-appearance: none;
            margin-top: -38px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23a8c7fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            border: none;
            cursor: grab;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 0.95em;
        }

        .row-title { color: #e3e3e3; font-weight: 500; }
        .row-val { color: #a8c7fa; font-weight: bold; }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1400px; padding: 0 20px;}
        .card { 
            background: #1e1f20; 
            width: 280px; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #444746;
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        .card-title { font-weight: bold; color: #fff; margin: 12px 0 4px 0; }
        .card-text { color: #c4c7c5; font-size: 0.85em; text-align: center;}
    </style>
</head>
<body onload="initApp()">

    <div class="version-badge">PROGRAM VERSION: 37.0 | DATE: 2026-04-12 | TIME: 5:15 PM</div>

    <h1>Stop Walking, Start Rolling</h1>
    <p class="sub-header">Gas / Battery black hole free</p>

    <div class="filter-container">
        <div class="input-group">
            <span class="style-label">Style Preference</span>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btn-any" onclick="setGender('any')">Unisex / All</button>
                <button class="gender-btn" id="btn-male" onclick="setGender('male')">Male Styles</button>
                <button class="gender-btn" id="btn-female" onclick="setGender('female')">Female Styles</button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="36" step="0.01" oninput="manualOverride(); updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height:</span>
                <span id="heightLabel" class="row-val">3'0" (91 cm)</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="0" max="100" value="0" step="0.01" oninput="manualOverride(); handleBudgetInput(this.value)">
                <div class="budget-indicators">
                    <div class="tick" style="left: 0%;"><span>$30</span></div>
                    <div class="tick" style="left: 52.7%;"><span>$300</span></div>
                    <div class="tick" style="left: 100%; transform: translateX(-100%);"><span>$1000</span></div>
                </div>
            </div>
            <div class="slider-row">
                <span class="row-title">Max Budget:</span>
                <span id="budgetLabel" class="row-val">$30</span>
            </div>
        </div>
    </div>

    <div class="gallery" id="bikeGallery"></div>

    <script>
        const bikeDatabase = [
            { name: "Blue Checker", style: "female", minHeight: 48, maxHeight: 68, price: 120, specs: "24\" Wheels | 13\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { name: "Green Haro", style: "male", minHeight: 62, maxHeight: 72, price: 180, specs: "26\" Wheels | 18\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { name: "Elementary Special", style: "any", minHeight: 40, maxHeight: 55, price: 80, specs: "20\" Wheels | Kids Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg" },
            { name: "Torker Cruiser", style: "female", minHeight: 58, maxHeight: 68, price: 60, specs: "24\" Wheels | Steel Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let selectedSex = 'any';
        let animationActive = true;
        let currentRealBudget = 30;

        function initApp() {
            renderGallery();
            requestAnimationFrame(animateSliders);
        }

        function renderGallery() {
            const gallery = document.getElementById('bikeGallery');
            gallery.innerHTML = bikeDatabase.map(bike => `
                <div class="card" data-style="${bike.style}" data-minh="${bike.minHeight}" data-maxh="${bike.maxHeight}" data-price="${bike.price}">
                    <img src="${bike.img}">
                    <div class="card-title">${bike.name}</div>
                    <div class="card-text">${bike.specs} | $${bike.price}</div>
                </div>
            `).join('');
            filterBikes();
        }

        function getExponentialPrice(val) {
            const minP = 30;
            const maxP = 1000;
            return Math.round(minP + (maxP - minP) * Math.pow(val / 100, 2));
        }

        function handleBudgetInput(sliderVal) {
            currentRealBudget = getExponentialPrice(sliderVal);
            document.getElementById('budgetLabel').innerText = `$${currentRealBudget}`;
            filterBikes();
        }

        function manualOverride() { animationActive = false; }

        function animateSliders(currentTime) {
            if (!animationActive) return;
            const durationH = 20000;
            const durationB = 15000;
            const progressH = (currentTime % durationH) / durationH;
            const progressB = (currentTime % durationB) / durationB;
            
            const currentH = 36 + (80 - 36) * progressH;
            document.getElementById('userHeight').value = currentH;
            updateHeight(currentH);

            document.getElementById('userBudget').value = progressB * 100;
            handleBudgetInput(progressB * 100);

            requestAnimationFrame(animateSliders);
        }

        function setGender(val) {
            manualOverride();
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            filterBikes();
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = Math.round(val % 12);
            let cm = Math.round(val * 2.54);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}" (${cm} cm)`;
            filterBikes();
        }

        function filterBikes() {
            const h = parseFloat(document.getElementById('userHeight').value);
            document.querySelectorAll('.card').forEach(card => {
                const style = card.dataset.style;
                const minH = parseInt(card.dataset.minh);
                const maxH = parseInt(card.dataset.maxh);
                const price = parseInt(card.dataset.price);

                const match = (selectedSex === 'any' || selectedSex === style) &&
                              (h >= minH && h <= maxH) &&
                              (price <= currentRealBudget);

                card.style.display = match ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
