<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker | Visual Geometry</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --border: #424245;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            padding: 40px 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }
        
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; text-align: center; }
        .sub-header { font-size: 16px; color: var(--text-dim); margin-bottom: 40px; text-align: center; }

        .filter-interface { max-width: 550px; width: 100%; margin-bottom: 50px; }
        .input-group { margin-bottom: 35px; }
        .group-label { font-size: 11px; font-weight: 600; margin-bottom: 15px; display: block; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }

        /* VISUAL BUTTONS */
        .style-toggle { display: flex; gap: 12px; justify-content: center; }
        .style-btn { 
            padding: 10px 20px; border: 1px solid var(--border); background: transparent; 
            color: var(--text-main); border-radius: 14px; cursor: pointer; 
            transition: all 0.2s ease; font-size: 13px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            min-width: 100px;
        }
        .style-btn svg { width: 24px; height: 24px; opacity: 0.6; transition: opacity 0.2s; }
        .style-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }
        .style-btn.active svg { opacity: 1; stroke: var(--bg-color); }

        .slider-wrapper { position: relative; padding: 15px 0; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; position: relative; z-index: 2; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: #444; }
        input[type=range]::-webkit-slider-thumb {
            height: 34px; width: 34px; -webkit-appearance: none; margin-top: -30px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23f5f5f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>');
            background-repeat: no-repeat; background-size: contain; border: none; cursor: grab; transition: transform 0.1s ease;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.15) rotate(-8deg); }

        .slider-row { display: flex; justify-content: space-between; margin-top: 8px; }
        .row-title, .row-val { color: var(--text-dim); font-size: 14px; }
        .row-val { color: var(--text-main); font-weight: 500; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; }

        .card { 
            background: #111; padding: 20px; border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1; position: relative; overflow: hidden; height: 220px; 
        }
        .card.hidden { display: none; opacity: 0; }
        .card img { max-width: 100%; height: 130px; object-fit: scale-down; border-radius: 10px; margin-bottom: 12px; transition: transform 0.4s ease; }
        .price-tag { color: var(--text-main); font-size: 20px; font-weight: 600; transition: transform 0.4s ease, opacity 0.3s ease; }

        .specs-overlay {
            position: absolute; bottom: -50px; opacity: 0;
            transition: all 0.3s ease; color: var(--text-dim); font-size: 13px; text-align: center;
        }
        .card:hover { transform: translateY(-5px); background: #161616; }
        .card:hover img { transform: scale(1.05); }
        .card:hover .price-tag { transform: translateY(-15px); }
        .card:hover .specs-overlay { bottom: 20px; opacity: 1; }
    </style>
</head>
<body onload="initApp()">

    <h1>Stop Walking. Start Rolling.</h1>
    <p class="sub-header">Gas/Battery blackhole free transportation</p>

    <div class="filter-interface">
        <div class="input-group">
            <span class="group-label">Frame Style</span>
            <div class="style-toggle">
                <button class="style-btn active" id="btn-any" onclick="setFrameStyle('any')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    All Bikes
                </button>
                <button class="style-btn" id="btn-high" onclick="setFrameStyle('high')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18l4-10h12l-4 10z"/></svg>
                    High Bar
                </button>
                <button class="style-btn" id="btn-step" onclick="setFrameStyle('step')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18s4-4 8-4 8 4 8 4z"/></svg>
                    Step-Thru
                </button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="68" step="0.1" oninput="updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height</span>
                <span id="heightLabel" class="row-val">5'8"</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="0" max="100" value="20" step="0.1" oninput="handleBudgetInput(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Budget Limit</span>
                <span id="budgetLabel" class="row-val">$150</span>
            </div>
        </div>
    </div>

    <div class="gallery" id="bikeGallery"></div>

    <script>
        const bikeDatabase = [
            { fStyle: "step", minH: 48, maxH: 68, price: 120, wheel: "24\"", frame: "13\"", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { fStyle: "high", minH: 62, maxH: 72, price: 180, wheel: "26\"", frame: "18\"", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { fStyle: "any", minH: 40, maxH: 55, price: 80, wheel: "20\"", frame: "Junior", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg" },
            { fStyle: "step", minH: 58, maxH: 68, price: 60, wheel: "24\"", frame: "Low Entry", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let currentFrame = 'any';

        function initApp() { renderGallery(); filterBikes(); }

        function renderGallery() {
            const gallery = document.getElementById('bikeGallery');
            gallery.innerHTML = bikeDatabase.map(bike => `
                <div class="card" data-fstyle="${bike.fStyle}" data-minh="${bike.minH}" data-maxh="${bike.maxH}" data-price="${bike.price}">
                    <img src="${bike.img}">
                    <div class="price-tag">$${bike.price}</div>
                    <div class="specs-overlay">
                        ${bike.wheel} Wheel • ${bike.frame} Frame
                    </div>
                </div>
            `).join('');
        }

        function handleBudgetInput(val) {
            const price = Math.round(30 + (1000 - 30) * Math.pow(val / 100, 3));
            document.getElementById('budgetLabel').innerText = `$${price}`;
            filterBikes();
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12); let inches = Math.round(val % 12);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}"`;
            filterBikes();
        }

        function setFrameStyle(val) {
            currentFrame = val;
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            filterBikes();
        }

        function filterBikes() {
            const h = parseFloat(document.getElementById('userHeight').value);
            const rawB = document.getElementById('userBudget').value;
            const b = Math.round(30 + (1000 - 30) * Math.pow(rawB / 100, 3));
            
            document.querySelectorAll('.card').forEach(card => {
                const match = (currentFrame === 'any' || currentFrame === card.dataset.fstyle) &&
                              (h >= card.dataset.minh && h <= card.dataset.maxh) &&
                              (card.dataset.price <= b);
                if (match) { card.classList.remove('hidden'); setTimeout(() => card.style.opacity = "1", 10); } 
                else { card.style.opacity = "0"; card.classList.add('hidden'); }
            });
        }
    </script>
</body>
</html>
