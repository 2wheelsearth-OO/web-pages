<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker - Gas / Battery black hole free</title>
    <style>
        /* Gemini-style Dark Theme */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #131314; 
            color: #e3e3e3; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }
        
        .version-badge {
            font-size: 11px;
            color: #8ab4f8; 
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .filter-container { 
            background: #1e1f20; 
            padding: 30px; 
            border-radius: 24px; 
            max-width: 600px; 
            margin-bottom: 40px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #444746;
            width: 100%; 
        }
        
        /* Suggestion Box Styling */
        .suggestion-box {
            background: #2b2d2f;
            border: 1px dashed #8ab4f8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            color: #8ab4f8;
            font-weight: 500;
        }

        h1 { text-align: center; color: #fff; font-weight: 400; margin-bottom: 5px; }
        .sub-header { text-align: center; color: #a8c7fa; margin-bottom: 30px; font-size: 1.1em; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; font-weight: 500; margin-bottom: 12px; color: #c4c7c5; }

        .gender-toggle { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #444746;
            background: #2b2d2f;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .gender-btn.active {
            background: #a8c7fa;
            color: #062e6f;
            border-color: #a8c7fa;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            background: #444746;
            border-radius: 5px;
            outline: none;
            accent-color: #a8c7fa;
        }
        .slider-val { float: right; color: #a8c7fa; font-weight: bold; }

        button#searchBtn { 
            background: #a8c7fa; 
            color: #062e6f; 
            border: none; 
            padding: 16px; 
            border-radius: 100px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            margin-top: 10px;
        }
        button#searchBtn:hover { background: #c2e7ff; transform: scale(1.01); }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1400px; padding: 0 20px;}
        .card { 
            background: #1e1f20; 
            width: 280px; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #444746;
            transition: transform 0.2s; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: translateY(-5px); }
        .card.hidden { display: none; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        
        p { color: #c4c7c5; font-size: 0.9em; letter-spacing: 0.5px; margin: 10px 0 0 0; text-align: center;}
    </style>
</head>
<body>

    <div class="version-badge">PROGRAM VERSION: 20.0 | DATE: 2026-04-12 | TIME: 1:25 PM</div>

    <h1>Stop Walking, Start Rolling</h1>
    <p class="sub-header">Gas / Battery black hole free</p>

    <div class="filter-container">
        <div class="suggestion-box" id="sizeSuggestion">
            Recommended Wheel Size: Slide the height bar to see!
        </div>

        <div class="input-group">
            <label>1. Style Preference</label>
            <div class="gender-toggle">
                <button class="gender-btn active" onclick="setGender('any', this)">Unisex / All</button>
                <button class="gender-btn" onclick="setGender('male', this)">Male Styles</button>
                <button class="gender-btn" onclick="setGender('female', this)">Female Styles</button>
            </div>
        </div>

        <div class="input-group">
            <label>2. Your Height: <span id="heightLabel" class="slider-val">5'5" (165 cm)</span></label>
            <input type="range" id="userHeight" min="36" max="80" value="65" oninput="updateHeight(this.value)">
        </div>

        <div class="input-group">
            <label>3. Max Budget: <span id="budgetLabel" class="slider-val">$400</span></label>
            <input type="range" id="userBudget" min="30" max="1000" value="400" oninput="updateBudget(this.value)">
        </div>

        <button id="searchBtn" onclick="filterBikes()">Find My Healthy Match</button>
    </div>

    <div class="gallery" id="bikeGallery">
        <div class="card" data-sex="female" data-min-h="48" data-max-h="68" data-price="120">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png">
            <p>24" Wheels | 13" Frame | $120</p>
        </div>

        <div class="card" data-sex="male" data-min-h="62" data-max-h="72" data-price="180">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg">
            <p>26" Wheels | 18" Frame | $180</p>
        </div>

        <div class="card" data-sex="any" data-min-h="40" data-max-h="55" data-price="80">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg">
            <p>20" Wheels | CS Frame | $80</p>
        </div>

        <div class="card" data-sex="female" data-min-h="58" data-max-h="68" data-price="60">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png">
            <p>24" Wheels | CS Frame | $60</p>
        </div>
    </div>

    <script>
        let selectedSex = 'any';

        function setGender(val, btn) {
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = val % 12;
            let cm = Math.round(val * 2.54);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}" (${cm} cm)`;
            
            // Logic for Wheel Suggestion
            let suggestion = "";
            if (val < 41) suggestion = "12\" Wheels (Toddler)";
            else if (val < 43) suggestion = "14\" Wheels (Youth Small)";
            else if (val < 46) suggestion = "16\" Wheels (Preschool)";
            else if (val < 50) suggestion = "18\" Wheels (Youth Mid)";
            else if (val < 58) suggestion = "20\" Wheels (BMX / Folding / Big Kid)";
            else if (val < 62) suggestion = "24\" Wheels (Teen / XS Adult)";
            else suggestion = "26\"+ Wheels (Standard Adult)";
            
            document.getElementById('sizeSuggestion').innerText = "Recommended Size: " + suggestion;
        }

        function updateBudget(val) {
            document.getElementById('budgetLabel').innerText = `$${val}`;
        }

        function filterBikes() {
            const height = parseInt(document.getElementById('userHeight').value);
            const budget = parseInt(document.getElementById('userBudget').value);
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const bSex = card.getAttribute('data-sex');
                const bMinH = parseInt(card.getAttribute('data-min-h'));
                const bMaxH = parseInt(card.getAttribute('data-max-h'));
                const bPrice = parseInt(card.getAttribute('data-price'));

                const sexMatch = (selectedSex === 'any' || selectedSex === bSex);
                const heightMatch = (height >= bMinH && height <= bMaxH);
                const budgetMatch = (bPrice <= budget);

                if (sexMatch && heightMatch && budgetMatch) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
