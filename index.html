<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker - Gas / Battery black hole free</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #131314; 
            color: #e3e3e3; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }
        
        .version-badge {
            font-size: 11px;
            color: #8ab4f8; 
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .filter-container { 
            background: #1e1f20; 
            padding: 40px; 
            border-radius: 28px; 
            max-width: 600px; 
            margin-bottom: 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border: 1px solid #444746;
            width: 100%; 
        }

        h1 { text-align: center; color: #fff; font-weight: 400; margin-bottom: 5px; }
        .sub-header { text-align: center; color: #a8c7fa; margin-bottom: 40px; font-size: 1.1em; }
        
        .input-group { margin-bottom: 45px; display: flex; flex-direction: column; }
        .style-label { font-weight: 500; margin-bottom: 15px; color: #c4c7c5; }

        .gender-toggle { display: flex; gap: 12px; }
        .gender-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid #444746;
            background: #2b2d2f;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .gender-btn.active {
            background: #a8c7fa;
            color: #062e6f;
            border-color: #a8c7fa;
        }

        .slider-wrapper {
            position: relative;
            padding-top: 30px; 
            margin-bottom: 5px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333537;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 42px;
            width: 42px;
            -webkit-appearance: none;
            margin-top: -38px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23a8c7fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            border: none;
            cursor: grab;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.95em;
        }

        .row-title { color: #e3e3e3; font-weight: 500; }
        .row-val { color: #a8c7fa; font-weight: bold; }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1400px; padding: 0 20px;}
        .card { 
            background: #1e1f20; 
            width: 280px; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #444746;
            transition: transform 0.2s; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        .card.hidden { display: none; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        .card-text { color: #c4c7c5; font-size: 0.9em; letter-spacing: 0.5px; margin: 12px 0 0 0; text-align: center;}
    </style>
</head>
<body onload="initApp()">

    <div class="version-badge">PROGRAM VERSION: 33.0 | DATE: 2026-04-12 | TIME: 3:55 PM</div>

    <h1>Stop Walking, Start Rolling</h1>
    <p class="sub-header">Gas / Battery black hole free</p>

    <div class="filter-container">
        <div class="input-group">
            <span class="style-label">Style Preference</span>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btn-any" onclick="setGender('any')">Unisex / All</button>
                <button class="gender-btn" id="btn-male" onclick="setGender('male')">Male Styles</button>
                <button class="gender-btn" id="btn-female" onclick="setGender('female')">Female Styles</button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="36" oninput="manualOverride(); updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height:</span>
                <span id="heightLabel" class="row-val">3'0" (91 cm)</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="30" max="1000" value="30" oninput="manualOverride(); updateBudget(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Max Budget:</span>
                <span id="budgetLabel" class="row-val">$30</span>
            </div>
        </div>
    </div>

    <div class="gallery" id="bikeGallery">
        <div class="card" data-sex="female" data-min-h="48" data-max-h="68" data-price="120">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png">
            <p class="card-text">24" Wheels | 13" Frame | $120</p>
        </div>
        <div class="card" data-sex="male" data-min-h="62" data-max-h="72" data-price="180">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg">
            <p class="card-text">26" Wheels | 18" Frame | $180</p>
        </div>
        <div class="card" data-sex="any" data-min-h="40" data-max-h="55" data-price="80">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg">
            <p class="card-text">20" Wheels | CS Frame | $80</p>
        </div>
        <div class="card" data-sex="female" data-min-h="58" data-max-h="68" data-price="60">
            <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png">
            <p class="card-text">24" Wheels | CS Frame | $60</p>
        </div>
    </div>

    <script>
        let selectedSex = 'any';
        let animationActive = true;

        function initApp() {
            filterBikes();
            animateSliders();
        }

        function manualOverride() {
            animationActive = false;
        }

        function animateSliders() {
            const targetHeight = 65;
            const targetBudget = 400;
            
            const durationH = 20000; // 20 Seconds
            const durationB = 15000; // 15 Seconds
            
            const startTime = performance.now();

            function step(currentTime) {
                if (!animationActive) return;

                const elapsed = currentTime - startTime;
                
                // Calculate separate progress for each slider
                const progressH = Math.min(elapsed / durationH, 1);
                const progressB = Math.min(elapsed / durationB, 1);
                
                // Linear movement looks more "constant pace" for slow speeds
                const currentH = Math.round(36 + (targetHeight - 36) * progressH);
                const currentB = Math.round(30 + (targetBudget - 30) * progressB);

                if (progressH <= 1) {
                    document.getElementById('userHeight').value = currentH;
                    updateHeight(currentH);
                }

                if (progressB <= 1) {
                    document.getElementById('userBudget').value = currentB;
                    updateBudget(currentB);
                }

                if (progressH < 1 || progressB < 1) {
                    requestAnimationFrame(step);
                } else {
                    animationActive = false;
                }
            }
            requestAnimationFrame(step);
        }

        function setGender(val) {
            manualOverride();
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            filterBikes();
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = val % 12;
            let cm = Math.round(val * 2.54);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}" (${cm} cm)`;
            filterBikes();
        }

        function updateBudget(val) {
            document.getElementById('budgetLabel').innerText = `$${val}`;
            filterBikes();
        }

        function filterBikes() {
            const height = parseInt(document.getElementById('userHeight').value);
            const budget = parseInt(document.getElementById('userBudget').value);
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const bSex = card.getAttribute('data-sex');
                const bMinH = parseInt(card.getAttribute('data-min-h'));
                const bMaxH = parseInt(card.getAttribute('data-max-h'));
                const bPrice = parseInt(card.getAttribute('data-price'));

                const sexMatch = (selectedSex === 'any' || selectedSex === bSex);
                const heightMatch = (height >= bMinH && height <= bMaxH);
                const budgetMatch = (bPrice <= budget);

                if (sexMatch && heightMatch && budgetMatch) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
