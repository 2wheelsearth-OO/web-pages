<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi-e Bicycle Co.</title>
    <style>
        :root {
            --bg-color: #fbfbfc; /* Apple-style off-white */
            --text-main: #1d1d1f; /* Dark, but not true black */
            --nav-bg: rgba(251, 251, 252, 0.95); /* Semi-transparent nav */
            --logo-size: 30px; /* Precise size control for the icon */
        }

        body { 
            font-family: "SF Pro Display", -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            -webkit-font-smoothing: antialiased; 
        }

        /* --- THE LOGO INTEGRATION --- */

        .logo-wrapper {
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* Set a fixed size to maintain visibility without dominating. 
           We use contain to ensure the spatter effects aren't cut off. */
        .website-logo {
            width: var(--logo-size);
            height: var(--logo-size);
            object-fit: contain;
            margin-right: 8px; /* Precise spacing to the text */
        }

        .brand-text {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.02em; /* Apple-style tracking */
        }

        /* --- MINIMALIST NAV BAR --- */

        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px); /* The "Glass" effect */
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 1000;
        }

        nav {
            max-width: 980px; /* Apple-style content width */
            margin: 0 auto;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-size: 14px; opacity: 0.8; transition: opacity 0.2s; }
        .nav-links a:hover { opacity: 1; }

        /* --- DEMO CONTENT --- */

        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding-top: 60px; text-align: center; }
        .hero h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
        .hero p { font-size: 24px; color: #86868b; margin: 10px 0 0 0; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo-wrapper">
                <img src="your_sumie_bicycle_logo.png" alt="Sumi-e Bicycle Logo" class="website-logo">
                <span class="brand-text">Velocipede</span>
            </div>
            <div class="nav-links">
                <a href="#store">Store</a>
                <a href="#about">About</a>
                <a href="#support">Support</a>
            </div>
        </nav>
    </header>

    <div class="hero">
        <h1>Simplify. Move.</h1>
        <p>The art of the ride.</p>
    </div>

</body>
</html>
