<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker | Pro Compact</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-blue: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --border: #424245;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 40px 20px; /* Reduced top padding */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .version-badge {
            font-size: 9px;
            color: var(--text-dim); 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Scaled down headers */
        h1 { 
            font-size: 38px; 
            font-weight: 600; 
            letter-spacing: -0.015em;
            margin-bottom: 8px;
            text-align: center;
        }

        .sub-header { 
            font-size: 18px; 
            color: var(--text-dim); 
            margin-bottom: 40px; 
            text-align: center;
        }

        .filter-interface { 
            max-width: 500px; 
            width: 100%; 
            margin-bottom: 50px;
        }

        .input-group { margin-bottom: 40px; }
        .group-label { 
            font-size: 12px; 
            font-weight: 600; 
            margin-bottom: 20px; 
            display: block; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            text-align: center;
        }

        .gender-toggle { 
            display: flex; 
            gap: 10px; 
            justify-content: center;
        }

        .gender-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .gender-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .slider-wrapper { position: relative; padding: 20px 0; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 2px;
            background: #333;
        }

        /* BICYCLE ICON ANIMATION */
        input[type=range]::-webkit-slider-thumb {
            height: 38px;
            width: 38px;
            -webkit-appearance: none;
            margin-top: -34px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23f5f5f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            border: none;
            cursor: grab;
            transition: transform 0.1s ease; /* Animation Speed */
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.1) rotate(-5deg); /* Animates when you click/drag */
            cursor: grabbing;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .row-title { color: var(--text-dim); font-size: 15px; }
        .row-val { color: var(--text-main); font-weight: 500; font-size: 15px; }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px; 
            width: 100%;
            max-width: 1100px;
        }

        .card { 
            background: #111; 
            padding: 20px; 
            border-radius: 18px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
            opacity: 1;
            max-height: 280px; 
            border: 1px solid transparent;
        }

        .card:hover { 
            transform: translateY(-8px);
            border-color: #222;
        }

        .card.hidden {
            display: none;
            opacity: 0;
        }

        .card img { 
            max-width: 100%;
            height: 140px; 
            object-fit: scale-down; 
            border-radius: 12px; 
            margin-bottom: 12px;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .card-text { color: var(--text-dim); font-size: 13px; line-height: 1.5; text-align: center; }
    </style>
</head>
<body onload="initApp()">

    <div class="version-badge">Version 46.0 | Compact & Animated</div>

    <h1>Stop Walking. Start Rolling.</h1>
    <p class="sub-header">Pure mechanical freedom.</p>

    <div class="filter-interface">
        <div class="input-group">
            <span class="group-label">Style</span>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btn-any" onclick="setGender('any')">All</button>
                <button class="gender-btn" id="btn-male" onclick="setGender('male')">Male</button>
                <button class="gender-btn" id="btn-female" onclick="setGender('female')">Female</button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="56" step="0.1" oninput="updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height</span>
                <span id="heightLabel" class="row-val">4'8"</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="0" max="100" value="30" step="0.1" oninput="handleBudgetInput(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Budget Limit</span>
                <span id="budgetLabel" class="row-val">$56</span>
            </div>
        </div>
    </div>

    <div class="gallery" id="bikeGallery"></div>

    <script>
        const bikeDatabase = [
            { name: "Blue Checker", style: "female", minHeight: 48, maxHeight: 68, price: 120, wheel: "24\"", frame: "13\"", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { name: "Green Haro", style: "male", minHeight: 62, maxHeight: 72, price: 180, wheel: "26\"", frame: "18\"", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { name: "Elementary Special", style: "any", minHeight: 40, maxHeight: 55, price: 80, wheel: "20\"", frame: "Small", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg" },
            { name: "Torker Cruiser", style: "female", minHeight: 58, maxHeight: 68, price: 60, wheel: "24\"", frame: "Step-Thru", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let selectedSex = 'any';

        function initApp() {
            renderGallery();
            filterBikes();
        }

        function renderGallery() {
            const gallery = document.getElementById('bikeGallery');
            gallery.innerHTML = bikeDatabase.map(bike => `
                <div class="card" data-style="${bike.style}" data-minh="${bike.minHeight}" data-maxh="${bike.maxHeight}" data-price="${bike.price}">
                    <img src="${bike.img}">
                    <div class="card-title">${bike.name}</div>
                    <div class="card-text">
                        Price: $${bike.price} | Wheel: ${bike.wheel}<br>
                        Frame: ${bike.frame}
                    </div>
                </div>
            `).join('');
        }

        function handleBudgetInput(val) {
            const price = Math.round(30 + (1000 - 30) * Math.pow(val / 100, 3));
            document.getElementById('budgetLabel').innerText = `$${price}`;
            filterBikes();
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = Math.round(val % 12);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}"`;
            filterBikes();
        }

        function setGender(val) {
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            filterBikes();
        }

        function filterBikes() {
            const h = parseFloat(document.getElementById('userHeight').value);
            const rawB = document.getElementById('userBudget').value;
            const b = Math.round(30 + (1000 - 30) * Math.pow(rawB / 100, 3));
            
            document.querySelectorAll('.card').forEach(card => {
                const match = (selectedSex === 'any' || selectedSex === card.dataset.style) &&
                              (h >= card.dataset.minh && h <= card.dataset.maxh) &&
                              (card.dataset.price <= b);
                
                if (match) {
                    card.classList.remove('hidden');
                    setTimeout(() => card.style.opacity = "1", 10);
                } else {
                    card.style.opacity = "0";
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
