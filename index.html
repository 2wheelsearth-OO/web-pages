<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocipede | Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0e0e11;
            --txt: #e3e3e3;
            --dim: #9aa0a6;
            --brd: #3c4043;
            --box: #1e1e21;
        }

        html, body { 
            height: 100vh; overflow: hidden; margin: 0; 
            background: var(--bg); color: var(--txt);
            font-family: "Google Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; }

        .corner { position: fixed; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; z-index: 100; }
        .tl { top: 15px; left: 20px; } .tr { top: 15px; right: 20px; }
        .bl { bottom: 15px; left: 20px; } .br { bottom: 15px; right: 20px; }
        
        h1 { 
            font-family: 'Permanent Marker', cursive; font-size: clamp(26px, 5vh, 50px); 
            margin: 0; opacity: 0.75; transform: rotate(-0.5deg); 
        }

        .sub { font-size: 14px; color: var(--dim); margin-bottom: 30px; }

        .ui { width: 100%; max-width: 500px; }
        .group { margin-bottom: 24px; }
        .label { font-size: 10px; color: var(--dim); text-transform: uppercase; text-align: center; display: block; margin-bottom: 12px; }

        .row { display: flex; gap: 8px; }
        .btn { 
            flex: 1; padding: 12px; border: 1px solid var(--brd); background: transparent; 
            color: var(--dim); border-radius: 12px; cursor: pointer; font-size: 10px;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn.active { background: var(--box); color: var(--txt); border-color: #4c4c4f; }

        /* Minimal Slider */
        .sld-wrap { padding: 20px 0 10px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #2a2a2e; }
        input[type=range]::-webkit-slider-thumb {
            height: 30px; width: 30px; -webkit-appearance: none; margin-top: -29px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23c4c7c5" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>') no-repeat center;
            background-size: contain; filter: drop-shadow(0 2px 2px #000);
        }

        .vals { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-top: 8px; }
        .bold { color: var(--txt); font-weight: 500; }

        /* Compact Gallery - Floating Style */
        .gallery { display: flex; gap: 20px; margin-top: 30px; min-height: 200px; position: relative; width: 100%; justify-content: center; }
        .watermark { position: absolute; width: 250px; opacity: 0.05; filter: invert(1); pointer-events: none; }
        
        .card { width: 180px; text-align: center; display: none; transition: transform 0.3s ease; }
        .img-box { 
            background: transparent; 
            aspect-ratio: 4/3; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: visible; 
            margin-bottom: 5px; 
        }
        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover img { transform: translateY(-10px) scale(1.05); }
        .price { font-size: 16px; font-weight: 500; margin-top: 8px; color: var(--txt); }
    </style>
</head>
<body onload="init()">

    <div class="corner tl" id="d">DATE</div>
    <div class="corner tr" id="t">TIME</div>
    <div class="corner bl">V66.0</div>
    <div class="corner br" id="s">RES</div>

    <h1>Stop Walking. Start Rolling.</h1>
    <p class="sub">Gas/Battery blackhole free transportation</p>

    <div class="ui">
        <div class="group">
            <span class="label">Frame Style</span>
            <div class="row">
                <button class="btn" id="b-high" onclick="setS('high')">High Bar</button>
                <button class="btn active" id="b-any" onclick="setS('any')">Unisex</button>
                <button class="btn" id="b-step" onclick="setS('step')">Step Thru</button>
            </div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="hS" min="40" max="80" value="68" oninput="upd()"></div>
            <div class="vals"><span>Rider Height</span><span id="hL" class="bold">5'8"</span></div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="bS" min="0" max="100" value="30" oninput="upd()"></div>
            <div class="vals"><span>Max Budget</span><span id="bL" class="bold">$200</span></div>
        </div>
    </div>

    <div class="gallery" id="g">
        <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/collagraphy%20bike%20logo.png" class="watermark">
    </div>

    <script>
        const db = [
            { id: "120-F-2413", s: "step", min: 48, max: 68, p: 120, url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { id: "180-M-2618", s: "high", min: 62, max: 72, p: 180, url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { id: "60-F-2400",  s: "step", min: 58, max: 68, p: 60,  url: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let curS = 'any';

        function init() {
            const g = document.getElementById('g');
            db.forEach(b => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `bike-${b.id}`;
                div.innerHTML = `<div class="img-box"><img src="${b.url}"></div><div class="price">$${b.p}</div>`;
                g.appendChild(div);
            });
            upd();
            setInterval(tick, 1000);
        }

        function setS(val) {
            curS = val;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`b-${val}`).classList.add('active');
            upd();
        }

        function upd() {
            const h = parseFloat(document.getElementById('hS').value);
            const bRaw = document.getElementById('bS').value;
            const b = Math.round(50 + (1000 - 50) * Math.pow(bRaw / 100, 2));
            
            document.getElementById('hL').innerText = `${Math.floor(h/12)}'${Math.round(h%12)}"`;
            document.getElementById('bL').innerText = `$${b}`;

            db.forEach(item => {
                const el = document.getElementById(`bike-${item.id}`);
                const match = (curS === 'any' || curS === item.s) && (h >= item.min && h <= item.max) && (item.p <= b);
                el.style.display = match ? 'block' : 'none';
            });
        }

        function tick() {
            const n = new Date();
            document.getElementById('d').innerText = n.toLocaleDateString().toUpperCase();
            document.getElementById('t').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('s').innerText = `${window.innerWidth}X${window.innerHeight}`;
        }
    </script>
</body>
</html>
