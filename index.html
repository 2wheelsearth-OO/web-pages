<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bicycle Matchmaker | Pro Focus</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1d1d1f;
            --accent-blue: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --border: #424245;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 80px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .version-badge {
            font-size: 10px;
            color: var(--text-dim); 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 { 
            font-size: 56px; 
            font-weight: 600; 
            letter-spacing: -0.015em;
            margin-bottom: 10px;
            text-align: center;
        }

        .sub-header { 
            font-size: 24px; 
            color: var(--text-dim); 
            margin-bottom: 60px; 
            text-align: center;
        }

        .filter-container { 
            background: var(--card-bg); 
            padding: 48px; 
            border-radius: 28px; 
            max-width: 600px; 
            width: 100%; 
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group { margin-bottom: 45px; }
        .group-label { font-size: 12px; font-weight: 600; margin-bottom: 20px; display: block; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .gender-toggle { display: flex; gap: 8px; }
        .gender-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: #2d2d2f;
            color: var(--text-main);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .gender-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        /* Slider with Bicycle Icon */
        .slider-wrapper { position: relative; padding: 25px 0; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 2px;
            background: var(--border);
        }

        input[type=range]::-webkit-slider-thumb {
            height: 38px;
            width: 38px;
            -webkit-appearance: none;
            margin-top: -34px; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23f5f5f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            border: none;
            cursor: grab;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .row-title { color: var(--text-dim); font-size: 16px; }
        .row-val { color: var(--text-main); font-weight: 500; font-size: 16px; }

        /* Reveal Button */
        .reveal-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }
        .reveal-btn:hover { background: #0077ed; transform: scale(1.01); }
        .reveal-btn:active { transform: scale(0.99); }

        /* Results Gallery (Hidden by Default) */
        .gallery-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 80px;
            display: none; /* Controlled by JS */
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column;
        }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 14px; margin-bottom: 18px; }
        .card-title { font-size: 19px; font-weight: 600; margin-bottom: 6px; }
        .card-text { color: var(--text-dim); font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body onload="initApp()">

    <div class="version-badge">Version 41.0 | Focused State</div>

    <h1>Stop Walking. Start Rolling.</h1>
    <p class="sub-header">The Gas / Battery black hole free Machine.</p>

    <div class="filter-container">
        <div class="input-group">
            <span class="group-label">Style</span>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btn-any" onclick="setGender('any')">All Models</button>
                <button class="gender-btn" id="btn-male" onclick="setGender('male')">Male</button>
                <button class="gender-btn" id="btn-female" onclick="setGender('female')">Female</button>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userHeight" min="36" max="80" value="36" step="0.1" oninput="updateHeight(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Rider Height</span>
                <span id="heightLabel" class="row-val">3'0"</span>
            </div>
        </div>

        <div class="input-group">
            <div class="slider-wrapper">
                <input type="range" id="userBudget" min="0" max="100" value="0" step="0.1" oninput="handleBudgetInput(this.value)">
            </div>
            <div class="slider-row">
                <span class="row-title">Maximum Budget</span>
                <span id="budgetLabel" class="row-val">$30</span>
            </div>
        </div>

        <button class="reveal-btn" onclick="revealResults()">Find my perfect match</button>
    </div>

    <div class="gallery-section" id="gallerySection">
        <h2 style="text-align: center; margin-bottom: 40px; font-weight: 500;">Curated for you</h2>
        <div class="gallery" id="bikeGallery"></div>
    </div>

    <script>
        const bikeDatabase = [
            { name: "Blue Checker", style: "female", minHeight: 48, maxHeight: 68, price: 120, specs: "24\" Wheels • 13\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Blue checker board girl bike - 120F2413.png" },
            { name: "Green Haro", style: "male", minHeight: 62, maxHeight: 72, price: 180, specs: "26\" Wheels • 18\" Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Haro $180 25 cm.jpg" },
            { name: "Elementary Special", style: "any", minHeight: 40, maxHeight: 55, price: 80, specs: "20\" Wheels • Kids Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Green Front Suspension 6 speed Elementary School Bike $80.jpg" },
            { name: "Torker Cruiser", style: "female", minHeight: 58, maxHeight: 68, price: 60, specs: "24\" Wheels • Steel Frame", img: "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/Girl Torker at front of house $60.png" }
        ];

        let selectedSex = 'any';

        function initApp() {
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('bikeGallery');
            gallery.innerHTML = bikeDatabase.map(bike => `
                <div class="card" data-style="${bike.style}" data-minh="${bike.minHeight}" data-maxh="${bike.maxHeight}" data-price="${bike.price}">
                    <img src="${bike.img}">
                    <div class="card-title">${bike.name}</div>
                    <div class="card-text">${bike.specs}<br>$${bike.price}</div>
                </div>
            `).join('');
        }

        function revealResults() {
            const section = document.getElementById('gallerySection');
            section.style.display = 'block';
            setTimeout(() => {
                section.style.opacity = '1';
                window.scrollTo({ top: section.offsetTop - 40, behavior: 'smooth' });
            }, 10);
            filterBikes();
        }

        function handleBudgetInput(val) {
            const price = Math.round(30 + (1000 - 30) * Math.pow(val / 100, 3));
            document.getElementById('budgetLabel').innerText = `$${price}`;
            if (document.getElementById('gallerySection').style.display === 'block') filterBikes();
        }

        function updateHeight(val) {
            let feet = Math.floor(val / 12);
            let inches = Math.round(val % 12);
            document.getElementById('heightLabel').innerText = `${feet}'${inches}"`;
            if (document.getElementById('gallerySection').style.display === 'block') filterBikes();
        }

        function setGender(val) {
            selectedSex = val;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + val).classList.add('active');
            if (document.getElementById('gallerySection').style.display === 'block') filterBikes();
        }

        function filterBikes() {
            const h = parseFloat(document.getElementById('userHeight').value);
            const rawB = document.getElementById('userBudget').value;
            const b = Math.round(30 + (1000 - 30) * Math.pow(rawB / 100, 3));
            
            document.querySelectorAll('.card').forEach(card => {
                const match = (selectedSex === 'any' || selectedSex === card.dataset.style) &&
                              (h >= card.dataset.minh && h <= card.dataset.maxh) &&
                              (card.dataset.price <= b);
                card.style.display = match ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
