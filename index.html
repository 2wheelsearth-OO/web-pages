<!-- VERSION 66.11.10 - Smart Filename Parsing (No IDs required) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocipede | Matchmaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0e0e11;
            --txt: #e3e3e3;
            --dim: #9aa0a6;
            --brd: #3c4043;
            --box: #1e1e21;
            --accent: #4c4c4f;
            --highlight: #72f272;
        }

        html, body { 
            height: 100vh; overflow: hidden; margin: 0; 
            background: var(--bg); color: var(--txt);
            font-family: "Google Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 10px 20px; box-sizing: border-box; }

        .corner { position: fixed; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; z-index: 100; }
        .tl { top: 15px; left: 20px; } .tr { top: 15px; right: 20px; }
        .bl { bottom: 15px; left: 20px; } .br { bottom: 15px; right: 20px; }
        
        .header-wrap { width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; padding: 0 10px; }
        
        h1 { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 1.8rem;
            line-height: 1;
            margin: 0; 
            opacity: 0.7; 
            white-space: nowrap; 
            display: inline-block;
            transform: scaleY(1.4) rotate(-0.5deg);
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .sub { font-size: 11px; color: var(--dim); margin-top: 10px; letter-spacing: 0.05em; opacity: 0.6; }

        .ui { width: 100%; max-width: 550px; margin-bottom: 10px; position: relative; z-index: 10; }
        .group { margin-bottom: 16px; }
        .label { font-size: 9px; color: var(--dim); text-transform: uppercase; text-align: center; display: block; margin-bottom: 8px; opacity: 0.5; }

        .row { display: flex; gap: 4px; padding: 0 5px; }
        .btn { 
            flex: 1; padding: 14px 4px; border: 1px solid var(--brd); background: transparent; 
            color: var(--dim); border-radius: 10px; cursor: pointer; font-size: 8px;
            transition: 0.2s; text-transform: uppercase; line-height: 1;
            display: flex; align-items: center; justify-content: center; text-align: center;
            white-space: nowrap; 
            letter-spacing: -0.01em;
        }

        .btn.active { background: var(--box); color: var(--txt); border-color: var(--accent); }

        .sld-wrap { padding: 15px 0 5px; position: relative; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 2; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: #2a2a2e; }
        input[type=range]::-webkit-slider-thumb {
            height: 24px; width: 24px; -webkit-appearance: none; margin-top: -12px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23c4c7c5" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>') no-repeat center;
            background-size: contain; filter: drop-shadow(0 2px 2px #000);
            cursor: pointer;
        }

        .vals { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-top: 4px; }
        .bold { color: var(--txt); font-weight: 500; }
        
        .range-msg { font-size: 9px; text-align: center; color: var(--highlight); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .gallery-container {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gallery { 
            display: flex; 
            gap: 15px; 
            width: 100%; 
            max-width: 900px; 
            justify-content: center; 
            flex-wrap: wrap; 
            overflow-y: auto; 
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
            scroll-behavior: smooth;
        }

        .watermark { 
            position: absolute; 
            width: 280px; 
            opacity: 0.02; 
            filter: invert(1); 
            pointer-events: none; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 1; 
        }
        
        .card { 
            width: 200px; 
            text-align: center; 
            display: none; 
            z-index: 2; 
            margin-bottom: 20px; 
            content-visibility: auto;
            contain-intrinsic-size: 200px 180px;
        }
        .img-box { 
            background: rgba(255,255,255,0.02); 
            border-radius: 12px;
            aspect-ratio: 4/3; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
        }
        .card img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.3s ease; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            z-index: 2;
        }
        .card:hover img { transform: scale(1.05); }
        .price { font-size: 18px; font-weight: 600; margin-top: 10px; color: var(--txt); letter-spacing: 0.05em; }
        .debug-id { font-size: 9px; color: var(--dim); margin-top: 4px; font-family: monospace; }
    </style>
</head>
<body onload="init()">

    <div class="corner tl" id="d">DATE</div>
    <div class="corner tr" id="t">TIME</div>
    <div class="corner bl">V66.11.10</div>
    <div class="corner br" id="s">RES</div>

    <div class="header-wrap">
        <h1>Stop Walking. Start Rolling.</h1>
        <p class="sub">Gas/Battery blackhole free transportation</p>
    </div>

    <div class="ui">
        <div class="group">
            <span class="label">Choose Your Ride</span>
            <div class="row">
                <button class="btn" id="b-M" onclick="setS('M')">Male / High Bar</button>
                <button class="btn active" id="b-any" onclick="setS('any')">All Types</button>
                <button class="btn" id="b-F" onclick="setS('F')">Female / Step Thru</button>
            </div>
        </div>

        <div class="group">
            <div class="sld-wrap"><input type="range" id="hS" min="40" max="82" value="68" oninput="upd()"></div>
            <div class="vals"><span>Rider Height</span><span id="hL" class="bold">5'8"</span></div>
        </div>

        <div class="group">
            <div class="sld-wrap">
                <input type="range" id="bS" min="0" max="100" value="30" oninput="upd()">
            </div>
            <div class="vals"><span>Target Budget</span><span id="bL" class="bold">$200</span></div>
            <div id="rangeDisplay" class="range-msg">Showing +/- $50</div>
        </div>
    </div>

    <div class="gallery-container">
        <img src="https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/collagraphy%20bike%20logo.png" class="watermark">
        <div class="gallery" id="g"></div>
    </div>

    <script>
        // List only the filenames. As long as the filename contains 
        // a code like "200M7023", the script will figure out the rest.
        const fileList = [
            "23 fram Hybrid 700C- 200M7023.png",
            "Blue checker board girl bike - 120F2413.png",
            "Green Haro 180M2021.jpg",
            "Girl Torker at front of house 60F2019.png",
            "FULL SUSPENSION TREK FUEL 600M2618.jpg",
            "Team USA Road Bike 160M2720.jpg",
            "TREK 3500 WITH ACCESSORY 400M2618.jpg",
            "Vevor-200F2416.jpg",
            "Pink Torker Girl 60F2017.jpg",
            "Trek 3900 480U2617.jpg",
            "Miltary Rank TIDAL FORCE Folding 1000 Watt E 1000U2618.png", 
            "Disc Break Alum Full suspension 240U2616.jpg",
            "1992 BMX RideHard Inferno bicycle $200 18half top tube 200M2618.png",
            "200M2019.png"
        ];

        let bikes = [];
        let curS = 'any';

        function extractDataFromFilename(filename) {
            // This regex looks for: Digits(Price) + [M,F,U](Type) + Digits(Wheel/Frame)
            const regex = /(\d+)([MFU])(\d{4})/i;
            const match = filename.match(regex);
            
            if (!match) return null;

            const price = parseInt(match[1]);
            const mfu = match[2].toUpperCase();
            const tail = match[3];
            const wheelSize = parseInt(tail.substring(0, 2));
            const frameSize = parseInt(tail.substring(2));
            const isChildrenWheel = (wheelSize <= 20);
            const baseUrl = "https://raw.githubusercontent.com/2wheelsearth-OO/Assets/main/";
            
            return {
                id: filename, // Use filename as the unique key
                price,
                mfu,
                wheelSize: wheelSize === 70 ? "700C" : wheelSize,
                numWheel: wheelSize,
                frameSize,
                isChildrenWheel,
                url: baseUrl + encodeURIComponent(filename)
            };
        }

        function init() {
            // Map the simple file list into bike objects
            bikes = fileList.map(extractDataFromFilename).filter(b => b !== null);
            
            const g = document.getElementById('g');
            bikes.forEach(b => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${b.id}`; // The id is now the filename string
                div.innerHTML = `
                    <div class="img-box">
                        <img loading="lazy" decoding="async" src="${b.url}" onerror="this.src='https://via.placeholder.com/220x165/1e1e21/9aa0a6?text=Image+Missing'">
                    </div>
                    <div class="price">$${b.price}</div>
                    <div class="debug-id">${b.wheelSize} whl / ${b.frameSize}" frm</div>
                `;
                g.appendChild(div);
            });
            upd();
            setInterval(tick, 1000);
        }

        function setS(val) {
            curS = val;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`b-${val}`).classList.add('active');
            upd();
        }

        function upd() {
            const h = parseFloat(document.getElementById('hS').value);
            const bRaw = document.getElementById('bS').value;
            const targetBudget = Math.round(50 + (1000 - 50) * Math.pow(bRaw / 100, 2));
            
            document.getElementById('hL').innerText = `${Math.floor(h/12)}'${Math.round(h%12)}"`;
            document.getElementById('bL').innerText = `$${targetBudget}`;

            const riderIsAdultHeight = (h >= 60);

            let bestSpread = 50;
            let currentMatches = [];

            // Shrink range loop to keep results <= 3
            for (let spread = 50; spread >= 0; spread -= 5) {
                bestSpread = spread;
                currentMatches = bikes.filter(bike => {
                    const priceMatch = (bike.price >= (targetBudget - spread) && bike.price <= (targetBudget + spread));
                    const typeMatch = (curS === 'any' || bike.mfu === 'U' || bike.mfu === curS);
                    const categoryMatch = (riderIsAdultHeight !== bike.isChildrenWheel);
                    
                    let frameMatch = false;
                    if (!bike.isChildrenWheel) {
                        frameMatch = (h >= (bike.frameSize + 44) && h <= (bike.frameSize + 58));
                    } else {
                        frameMatch = (h >= (bike.frameSize + 30) && h <= (bike.frameSize + 55));
                    }
                    return priceMatch && typeMatch && categoryMatch && frameMatch;
                });

                if (currentMatches.length <= 3) break;
            }

            const minB = targetBudget - bestSpread;
            const maxB = targetBudget + bestSpread;
            document.getElementById('rangeDisplay').innerText = 
                currentMatches.length === 0 ? "No matches found" : 
                `Best matches ($${minB} — $${maxB})`;
            
            const matchIds = currentMatches.map(m => m.id);
            bikes.forEach(bike => {
                const el = document.getElementById(`card-${bike.id}`);
                el.style.display = matchIds.includes(bike.id) ? 'block' : 'none';
            });
        }

        function tick() {
            const n = new Date();
            document.getElementById('d').innerText = n.toLocaleDateString().toUpperCase();
            document.getElementById('t').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('s').innerText = `${window.innerWidth}X${window.innerHeight}`;
        }
    </script>
</body>
</html>
